# SIYI A8 Mini deployment profile for YOLOv26n trained on LRDDv2 + Anti-UAV300
# (no-bird, single drone class), 1080p source @ 30 fps, FP16 TRT engine @ 384.
#
# Camera-side prerequisite: SIYI Camera app stream output set to 1920x1080.
# 30 fps source (not 60) — same reasoning as the stage2 v2 config: at 60 fps
# the decoder load eats the GPU budget the detector needs.
#
# Model lineage:
#   Branch: v4-yolov26-LDDRv2
#   Training config: configs/training/airborne_yolov26_lrdd.yaml
#     base_weights: yolov26n.pt  (nano)
#     image_size: 384            (dataset pre-resized to 384)
#   Dataset: LRDDv2 + Anti-UAV300 RGB (no birds), single class "drone".
#   Engine: data/models/yolov26_lrdd_v2/best.engine
#     built with scripts/export_tensorrt.py --imgsz 384 --batch 1 --half
#     TensorRT 10.3.0 FP16 on Orin (7.2 MB engine, ~373 s build).
#
# Diff from deploy_jetson_siyi_a8_mini_stage2_engine_1080p_v2.yaml:
#   - detector.weights -> yolov26_lrdd_v2/best.engine
#   - detector.input_size 640 -> 384 (matches engine static shape)
#   - detector.keep_class_ids [0,1,2,3] -> [0] (single drone class)
#   - detector.confidence_threshold 0.15 -> 0.25 (yolov26 calibration unknown;
#       start at eval-config default, lower after first bench if recall is weak)
#   - detector.model_version updated for traceability
#   - tracker/lock label and class settings unchanged (already "drone")
#
# First bench checklist (before flying):
#   1. Run with gimbal_follow.enabled=false (default) and confirm detections
#      appear on the operator view at expected ranges.
#   2. Inspect data/outputs/<run>/diagnostics.csv for detection rate vs
#      LOCKED-state ratio. If detection rate < 60% on a known drone target,
#      lower detector.confidence_threshold to 0.15 and re-run.
#   3. Then enable gimbal_follow with dry_run=true to verify command signs
#      via scripts/dev/siyi_gimbal_bench.py.

schema_version: "skyscout.config.v1"
profile_name: "deploy_jetson_yolov26_lrdd_v2_siyi_a8_mini_1080p"

source:
  type: "siyi_a8_mini"
  url: "rtsp://192.168.144.25:8554/main.264"
  source_id: "siyi_a8_mini_main_rtsp"
  transport: "tcp"
  expected_width: 1920
  expected_height: 1080
  fps: 30.0
  open_timeout_s: 10.0
  # Time the pipeline will wait for a new frame before aborting with "no new
  # frames".  5 s was too tight: when the GStreamer nvv4l2decoder pipeline posts
  # EOS (HEVC decode error / network blip) the reader loop reconnects with:
  #   1 s reconnect_delay_s + up to 10 s for GStreamer pipeline get_state.
  # That can exceed 5 s.  20 s gives the reconnect a comfortable margin while
  # still catching a genuinely dead camera faster than the 60 s cold-boot grace.
  read_timeout_s: 20.0
  reconnect_delay_s: 1.0
  # Field cold-boot grace: the Jetson is usually up before the SIYI air-unit
  # has powered on and is serving a decodable stream.  The source starts the
  # instant the first frame decodes, so a warm camera is unaffected by a large
  # budget; this only sets how long we tolerate a not-yet-ready camera before
  # aborting.  20s was too tight in the field (1/10 cold boots succeeded).
  first_frame_timeout_s: 60.0
  max_frames: null
  frame_stride: 1
  strict: true

camera:
  calibration_id: "SIYI_A8_MINI_1080P_UNREVIEWED_v1"
  is_calibrated: false
  intrinsics:
    fx: null
    fy: null
    cx: null
    cy: null
    distortion: null
  resolution_wh: [1920, 1080]

detector:
  backend: "yolo_ultralytics"
  weights: "data/models/yolov26_lrdd_v2_img1024/best.engine"
  # Engine built natively on this Jetson (R36.5.0, TRT 10.3.0) at imgsz=1024.
  # 1920x1080 letterboxed to 1024 gives ~53x32 px drone bbox in model input,
  # well above the stride-8 head's reliable detection range.
  input_size: 1024
  confidence_threshold: 0.25
  iou_threshold: 0.45
  keep_class_ids: [0]
  fallback_keep_high_conf: false
  fallback_high_conf_threshold: 0.35
  device: "0"
  model_version: "yolov26n_lrdd_v2_tensorrt_fp32_imgsz1024_siyi_a8_mini_1080p_gimbal_follow"

tracker:
  backend: "single_target_kalman_lk"
  match_threshold: 0.2
  center_match_threshold_px: 200
  lk_min_points: 4              # was 6; lowered for tiny targets (0.08% frame)
  reacquisition_radius_px: 450  # was 320; wider window for fast-moving drones
  max_primary_switches_per_second: 1.0
  track_buffer_frames: 60       # was 36; longer buffer before giving up
  max_prediction_only_frames: 12 # was 5; ~2s coast at 6fps with inter-frame LK
  min_prediction_confidence: 0.06
  reject_edge_initial_detections: true
  edge_reject_margin_px: 2.0
  min_track_length: 3
  ego_motion_compensation: false

lock:
  acceptable_lock_labels: ["drone"]
  acquired_to_tracking_frames: 3
  tracking_to_locked_frames: 5
  min_class_confidence: 0.25
  min_lock_quality: 0.30
  lost_to_aborted_seconds: 2.0
  strike_ready:
    min_locked_duration_seconds: 0.5
    min_bbox_frame_fraction: 0.05
    bbox_center_window: 0.5
    max_cue_age_seconds: 5.0

cue:
  source: null
  default_expiry_ms: 1500
  default_position_sigma_m: 50.0

range:
  method: "none"
  class_size_prior_m: {}

guidance:
  enabled: true
  output_jsonl: true
  camera:
    mode: "fov"
    horizontal_fov_deg: 81.0
    vertical_fov_deg: null
    frame_width_px: 1920
    frame_height_px: 1080
    fx_px: null
    fy_px: null
    cx_px: null
    cy_px: null
    assume_principal_point_center: true
    calibration_reviewed: false
  validity:
    advisory_before_lock: true
    allowed_lock_states: ["TRACKING", "LOCKED", "STRIKE_READY"]
    acceptable_class_labels: ["drone"]
    min_confidence: 0.25
    require_guidance_valid_target_state: false
    max_stale_frames: 3
  filtering:
    enabled: true
    ema_alpha: 0.35
    prediction_enabled: true
    lead_time_s: 0.20
    max_prediction_px: 250
    history_len: 8
  controller:
    enabled: true
    mode: "yaw_pid"
    kp_yaw: 0.1
    ki_yaw: 0
    kd_yaw: 0
    deadband_deg: 1.0
    max_yaw_rate_deg_s: 45.0
    max_delta_yaw_rate_deg_s: 20.0
    pitch_command_enabled: false
  overlay:
    enabled: true
    draw_optical_center: true
    draw_target_center: true
    draw_error_vector: true
    draw_text: true
    draw_bbox_geometry: true

gimbal_follow:
  enabled: true               # gimbal follow ON for live test
  dry_run: false              # commands ACTUALLY SENT to SIYI (verify signs via bench first)
  backend: "siyi_udp"
  host: "192.168.144.25"
  port: 37260
  timeout_s: 0.20
  detection_only: false
  allowed_lock_states: ["TRACKING", "LOCKED", "STRIKE_READY"]
  min_confidence: 0.25
  command_hz: 10.0
  deadband_px_x: 60.0
  deadband_px_y: 45.0
  kp_yaw: 15.0
  kp_pitch: 12.0
  max_yaw_cmd: 18
  max_pitch_cmd: 15
  invert_yaw: false
  invert_pitch: false
  stop_after_lost_s: 0.25
  log_jsonl: true
  log_filename: "gimbal_follow_commands.jsonl"

# Phase 1 ArduPilot flight-controller link (yaw-only + alt-hold, dry-run default).
# Mirrors the parameters proven in the engineer's hand_track.py bench setup.
# To go live: set enabled=true AND dry_run=false (or pass --flight-control-live).
# IMPORTANT: requires pymavlink (not in requirements-jetson.txt by default).
# Install once at the office:   pip install pymavlink
flight_control:
  enabled: false              # off until explicitly opted in
  dry_run: true               # computed-but-not-sent by default
  # /dev/pixhawk is a stable udev symlink created by scripts/dev/99-pixhawk.rules
  # (see README or run `sudo scripts/dev/install_udev_rules.sh`).  It always
  # points to the Pixhawk's main MAVLink interface regardless of whether Linux
  # assigns it ACM0 or ACM1 after a replug.  Falls back to ttyACM0 at runtime
  # if the symlink is absent (see MavlinkFlightLink._resolve_serial_port).
  serial_port: "/dev/pixhawk"
  baud: 115200                # 115200 for USB-ACM, 921600 for telemetry radios
  heartbeat_timeout_s: 8.0    # wait for FC heartbeat before declaring connect failure
  command_delay_s: 3.0        # wait this long after connect before any FC command
  guided_alt_m: 2.0           # NAV_TAKEOFF target / altitude-hold setpoint (meters AGL)
  post_takeoff_settle_s: 4.0  # hold yaw=0 for this long after takeoff is confirmed
  no_alt_takeoff_confirm_s: 3.0  # if no GLOBAL_POSITION_INT, treat ARM+GUIDED for this long = airborne
  send_hz: 30.0               # fixed-rate MAVLink command transmission
  # ---- yaw command shaping ----
  # CONDITION_YAW is sent as an ABSOLUTE heading (param4=0): the controller's
  # yaw offset is added to the live FC heading (from ATTITUDE) and commanded
  # along the shortest path. This avoids cumulative turning/precession that
  # repeated relative-yaw ("turn another X deg") commands produced.
  max_heading_deg: 15.0       # per-command yaw-offset clamp (matches their PID limit)
  yaw_slew_deg_s: 15.0        # CONDITION_YAW slew rate (deg/s)
  yaw_deadband_deg: 1.0       # no yaw command when bearing error within this band
  invert_yaw: false           # flip sign if your FC convention is opposite
  yaw_abs_min_delta_deg: 1.0  # skip yaw sends when abs-heading change is below this
  yaw_abs_keepalive_s: 0.5    # ...unless this long has elapsed since the last send
  # ---- failsafes (Phase 3 will extend these) ----
  stale_guidance_timeout_s: 0.5  # zero yaw if no valid hint for this long
  allowed_lock_states: ["TRACKING", "LOCKED", "STRIKE_READY"]
  # ---- I/O ----
  log_jsonl: true
  log_filename: "flight_commands.jsonl"

mock_bridge:
  enabled: false
  output_jsonl: true
  require_reviewed_calibration: true
  allowed_lock_states: ["LOCKED", "STRIKE_READY"]
  require_guidance_hint_valid: true
  max_abs_yaw_rate_deg_s: 45.0

evaluation:
  enabled: false
  gt_path: null

output:
  save_annotated_video: true
  save_raw_video: true
  save_target_states_jsonl: true
  save_raw_detections: false
  save_diagnostics_csv: true
  save_manifest: true
  annotated_video_fps: 15.0

operator_view:
  enabled: true
  mode: "window"
  host: "0.0.0.0"
  port: 8090
  max_width: 1280
  jpeg_quality: 70
  window_name: "SkyScouter Operator View"
  fullscreen: true
  display_width: 1920
  display_height: 1080
  window_x: 0
  window_y: 0
  window_backend: "gstreamer"
  display_fps: 30
