# Skyscouter Phase 1 — acceptance evaluation profile for the v2 trained
# airborne YOLO detector (yolo11s_airborne_drone_vs_bird_v2, AOD-4 + Anti-UAV300).
#
# Mirrors trained_yolo11s_eval.yaml but points at the v2 weights.
# Confidence threshold defaults to 0.25 (mission policy). For the recall
# experiment at 0.10 see trained_yolo11s_v2_conf010_eval.yaml.

schema_version: "skyscout.config.v1"
profile_name: "trained_yolo11s_airborne_v2_eval"

source:
  type: "video_file"
  frame_stride: 1
  strict: true

camera:
  calibration_id: "BENCH_REPLAY_UNCALIBRATED_v1"
  is_calibrated: false
  intrinsics:
    fx: null
    fy: null
    cx: null
    cy: null
    distortion: null
  resolution_wh: null

# ---------------- Detector ----------------
# v2 weights from training run yolo11s_airborne_drone_vs_bird_v2.
# Class IDs match v1: 0=drone, 1=bird, 2=airplane, 3=helicopter.
# (Note: data.yaml v2 may differ in class index ordering — verify if needed.)
detector:
  backend: "yolo_ultralytics"
  weights: "data/training/runs/yolo11s_airborne_drone_vs_bird_v2/weights/best.pt"
  input_size: 1024
  confidence_threshold: 0.25
  iou_threshold: 0.45
  keep_class_ids: [0, 1, 2, 3]
  fallback_keep_high_conf: false
  fallback_high_conf_threshold: 0.35
  device: "auto"
  model_version: "yolo11s_airborne_drone_vs_bird_v2_e31_partial"

# ---------------- Tracker (unchanged) ----------------
tracker:
  backend: "single_target_kalman_lk"
  match_threshold: 0.3
  center_match_threshold_px: 80
  lk_min_points: 8
  reacquisition_radius_px: 180
  max_primary_switches_per_second: 1.0
  track_buffer_frames: 30
  min_track_length: 3
  ego_motion_compensation: false

# ---------------- Lock state machine (unchanged) ----------------
lock:
  acceptable_lock_labels: ["drone", "uas", "airborne_candidate"]
  acquired_to_tracking_frames: 3
  tracking_to_locked_frames: 8
  min_class_confidence: 0.30
  min_lock_quality: 0.50
  lost_to_aborted_seconds: 2.0
  strike_ready:
    min_locked_duration_seconds: 0.5
    min_bbox_frame_fraction: 0.05
    bbox_center_window: 0.5
    max_cue_age_seconds: 5.0

cue:
  source: null
  default_expiry_ms: 1500
  default_position_sigma_m: 50.0

range:
  method: "none"
  class_size_prior_m: {}

evaluation:
  enabled: true
  gt_path: "C:/Users/Ali/Documents/Datasets/drone_sparse_gt_corrected.csv"

output:
  save_annotated_video: true
  save_target_states_jsonl: true
  save_raw_detections: false
  save_diagnostics_csv: true
  save_manifest: true
  annotated_video_fps: null
