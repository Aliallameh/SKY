schema_version: "skyscout.airborne_dataset_manifest.v1"

# Target detector taxonomy for the kamikaze-drone sky-lock mission.
# Do not train a generic COCO detector for acceptance. The detector must learn
# airborne semantics first; the tracker then owns temporal identity.
target_classes:
  - drone
  - bird
  - airplane
  - helicopter
  - unknown_airborne

split:
  train: 0.80
  val: 0.15
  test: 0.05
  seed: 42

sources:
  # Primary external dataset to add first. Expected role: drone/bird/aircraft
  # semantic separation in complex sky/weather backgrounds.
  - name: aod4_airborne_objects
    enabled: true
    type: yolo_detection
    root: "C:/Users/Ali/Documents/Datasets/AOD 4"
    images_dir: "Images"
    labels_dir: "Annotations/YOLOv8 format"
    label_subdir: "labels"
    source_classes: ["airplane", "bird", "drone", "helicopter"]
    class_map:
      "0": airplane
      "1": bird
      "2": drone
      "3": helicopter
    notes: "AOD-4 extracted 2026-04-28: 15.7k train, 4.5k val, 2.2k test. Classes 0-3 → airplane,bird,drone,helicopter balanced ~5.5k each."

  # Add when available. Expected role: drone-vs-bird hard discrimination.
  - name: drone_vs_bird_challenge
    enabled: false
    type: yolo_detection
    root: "/absolute/path/to/drone-vs-bird-yolo"
    images_dir: "images"
    labels_dir: "labels"
    source_classes: ["drone", "bird"]
    class_map:
      drone: drone
      bird: bird
    notes: "Use to reduce bird false locks."

  # Add when available. Expected role: long-range/small-pixel drone recall.
  - name: lrddv2_long_range_drone
    enabled: false
    type: yolo_detection
    root: "/absolute/path/to/LRDDv2-yolo"
    images_dir: "images"
    labels_dir: "labels"
    source_classes: ["drone"]
    class_map:
      drone: drone
    notes: "Use for 50px-or-smaller drone recall; exact conversion depends on obtained format."

  # Local acceptance/evaluation labels from my_drone_chase.MP4. Keep this small
  # and honest. Use positives for domain adaptation only after reserving a copy
  # for acceptance evaluation.
  - name: local_my_drone_chase_sparse_gt
    enabled: true
    type: skyscouter_sparse_gt_video
    video_path: "C:/Users/Ali/Desktop/SKY/data/videos/my_drone_chase.MP4"
    gt_csv: "C:/Users/Ali/Documents/Datasets/drone_sparse_gt_corrected.csv"
    include_labels:
      - drone
      - negative
    notes: "User-corrected sparse GT; 44 positive drone frames and 45 hard negatives as of 2026-04-28. Small local domain-adaptation set."
