schema_version: "skyscout.airborne_dataset_manifest.v1"

# Target detector taxonomy for the kamikaze-drone sky-lock mission.
# Do not train a generic COCO detector for acceptance. The detector must learn
# airborne semantics first; the tracker then owns temporal identity.
target_classes:
  - drone
  - bird
  - airplane
  - helicopter
  - unknown_airborne

split:
  train: 0.80
  val: 0.15
  test: 0.05
  seed: 42

sources:
  # Primary external dataset to add first. Expected role: drone/bird/aircraft
  # semantic separation in complex sky/weather backgrounds.
  - name: aod4_airborne_objects
    enabled: true
    type: yolo_detection
    root: "C:/Users/Ali/Documents/Datasets/AOD 4"
    images_dir: "Images"
    labels_dir: "Annotations/YOLOv8 format"
    label_subdir: "labels"
    source_classes: ["airplane", "bird", "drone", "helicopter"]
    class_map:
      "0": airplane
      "1": bird
      "2": drone
      "3": helicopter
    notes: "AOD-4 extracted 2026-04-28: 15.7k train, 4.5k val, 2.2k test. Classes 0-3 → airplane,bird,drone,helicopter balanced ~5.5k each."

  # Anti-UAV300 RGBT — purpose-built counter-UAV benchmark dataset.
  # 318 sequences (160 train / 67 val / 91 test), ~296K annotated frames,
  # both RGB (visible.mp4) and IR (infrared.mp4). We use RGB only here so
  # the domain matches our RGB camera pipeline.
  #
  # max_positives_per_seq = 60 keeps per-class drone count comparable to AOD-4
  # (~6K drone objects). With 160 train seqs × ~77% visible rate × stride 5,
  # raw positives ≈ 24K; capped to 60/seq ≈ 9.6K, well-balanced with AOD-4.
  # Increase cap or lower stride if you want more drone coverage.
  #
  # IMPORTANT: paths are machine-specific. Edit root to match your local path.
  - name: anti_uav300_rgb
    enabled: true
    type: anti_uav_rgbt
    root: "C:/Users/Ali/Desktop/Anti-UAV-RGBT"
    modality: rgb
    splits:
      - train
      - val
      - test
    drone_label: drone
    stride: 5                    # sample every 5th frame to reduce near-duplicate frames
    max_positives_per_seq: 60    # cap per sequence to balance with AOD-4
    max_negatives_per_seq: 5     # a few hard negatives per sequence (drone absent frames)
    seed: 42
    notes: >
      Anti-UAV300 RGB. 318 seqs, ~934 frames/seq average. Official challenge
      dataset (CVPR 2020/2021/2023). Provides real sky drone tracking sequences
      with per-frame visibility flags — drone can disappear/reappear. Adds
      long-range small-pixel drone instances not in AOD-4.

  # Add when available. Expected role: drone-vs-bird hard discrimination.
  - name: drone_vs_bird_challenge
    enabled: false
    type: yolo_detection
    root: "/absolute/path/to/drone-vs-bird-yolo"
    images_dir: "images"
    labels_dir: "labels"
    source_classes: ["drone", "bird"]
    class_map:
      drone: drone
      bird: bird
    notes: "Use to reduce bird false locks."

  # Add when available. Expected role: long-range/small-pixel drone recall.
  - name: lrddv2_long_range_drone
    enabled: false
    type: yolo_detection
    root: "/absolute/path/to/LRDDv2-yolo"
    images_dir: "images"
    labels_dir: "labels"
    source_classes: ["drone"]
    class_map:
      drone: drone
    notes: "Use for 50px-or-smaller drone recall; exact conversion depends on obtained format."

  # Local acceptance/evaluation labels from my_drone_chase.MP4. Keep this small
  # and honest. Use positives for domain adaptation only after reserving a copy
  # for acceptance evaluation.
  - name: local_my_drone_chase_sparse_gt
    enabled: true
    type: skyscouter_sparse_gt_video
    video_path: "C:/Users/Ali/Desktop/SKY/data/videos/my_drone_chase.MP4"
    gt_csv: "C:/Users/Ali/Documents/Datasets/drone_sparse_gt_corrected.csv"
    include_labels:
      - drone
      - negative
    notes: "User-corrected sparse GT; 44 positive drone frames and 45 hard negatives as of 2026-04-28. Small local domain-adaptation set."
