schema_version: "skyscout.airborne_training.v3"
profile_name: "yolo11s_airborne_stage1_drone_only"

dataset:
  manifest: "configs/training/airborne_dataset_manifest_v3.yaml"
  prepared_dir: "data/training/airborne_stage1_drone_only"
  data_yaml: "data/training/airborne_stage1_drone_only/data.yaml"
  gate: "diagnostic/pretraining only; do not promote Stage 1 weights"

model:
  family: "ultralytics_yolo"
  base_weights: "yolo11s.pt"
  image_size: 1024
  pretrained: true

training:
  epochs: 80
  batch: 8
  patience: 20
  workers: 8
  device: "auto"
  project: "data/training/runs"
  run_name: "yolo11s_airborne_stage1_drone_only"
  optimizer: "auto"
  close_mosaic: 10
  seed: 42
  cache: false
  amp: true
  cos_lr: true

augmentation:
  hsv_h: 0.015
  hsv_s: 0.45
  hsv_v: 0.35
  degrees: 0.0
  translate: 0.06
  scale: 0.50
  shear: 0.0
  perspective: 0.0
  fliplr: 0.5
  mosaic: 0.7
  mixup: 0.05
  copy_paste: 0.0

gates:
  before_smoke_test:
    - dataset_inspection_passed
    - prototype_conversions_validated
    - previews_visual_reviewed
  smoke_test_command: >
    .\.venv_train\Scripts\python.exe scripts/train_airborne_yolo.py
    --config configs/training/airborne_yolo11_stage1_drone_only.yaml --epochs 1 --batch 8 --workers 8
