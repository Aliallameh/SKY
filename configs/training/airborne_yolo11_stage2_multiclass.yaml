schema_version: "skyscout.airborne_training.v3"
profile_name: "yolo11s_airborne_stage2_multiclass"

dataset:
  manifest: "configs/training/airborne_dataset_manifest_v3.yaml"
  prepared_dir: "data/training/airborne_stage2_multiclass"
  data_yaml: "data/training/airborne_stage2_multiclass/data.yaml"
  gate: "requires AOD-4 confuser preview/audit and capped build before full training"
  build_policy: >
    AOD-4 is a secondary rejection/confuser source, not the authority for drone
    identity. The default Stage 2 builder excludes images containing AOD-4
    `drone` boxes until the AOD-4 drone-vs-airplane visual audit passes. Drone
    positives should come mainly from VisioDECT, Anti-UAV-RGBT, DUT-Anti-UAV,
    and local Mavic-style annotations.
  recommended_build_command: >
    .\.venv_train\Scripts\python.exe scripts/build_staged_airborne_dataset.py
    --stage stage2 --link-mode copy
    --cap aod4=6000 --cap anti_uav_rgbt=5000 --cap dut_anti_uav=5000 --cap visiodect=12000

model:
  family: "ultralytics_yolo"
  base_weights: "data/training/runs/yolo11s_airborne_stage1_drone_only_b16w4_nomix/weights/best.pt"
  image_size: 1024
  pretrained: true

training:
  epochs: 80
  batch: 16
  patience: 20
  workers: 4
  device: "auto"
  project: "data/training/runs"
  run_name: "yolo11s_airborne_stage2_multiclass_capped_aod4conf_b16w4_nomix"
  optimizer: "auto"
  close_mosaic: 10
  seed: 42
  cache: false
  amp: true
  cos_lr: true

augmentation:
  hsv_h: 0.015
  hsv_s: 0.45
  hsv_v: 0.35
  degrees: 0.0
  translate: 0.06
  scale: 0.50
  shear: 0.0
  perspective: 0.0
  fliplr: 0.5
  mosaic: 0.7
  # Keep mixup off on Windows at 1024px. Stage 1 already hit DataLoader worker
  # RAM failures from mixup; confuser learning here should come from real
  # AOD-4/VisioDECT/Anti-UAV/DUT examples, not blend augmentation.
  mixup: 0.0
  copy_paste: 0.0

decision_gate_for_stage3_base:
  use_stage2_as_stage3_base_only_if:
    - drone_to_airplane_confusion_improves_vs_v2_on_local_hard_cases
    - drone_to_airplane_confusion_improves_vs_v2_on_held_out_mavic_like_validation
    - bird_to_drone_and_airplane_to_drone_false_positives_do_not_significantly_increase
  otherwise_use: "data/models/yolo11s_airborne_aod4_antiuav300_v2/best.pt"

gates:
  before_smoke_test:
    - dataset_inspection_passed
    - prototype_conversions_validated
    - previews_visual_reviewed
    - full_conversion_summary_passed
    - aod4_confuser_previews_passed
    - aod4_tiny_drone_vs_airplane_visual_audit_passed_before_enabling_aod4_drone_boxes
  smoke_test_command: >
    .\.venv_train\Scripts\python.exe scripts/train_airborne_yolo.py
    --config configs/training/airborne_yolo11_stage2_multiclass.yaml --epochs 1 --batch 8 --workers 8
