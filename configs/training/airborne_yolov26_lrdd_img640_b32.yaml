schema_version: "skyscout.airborne_training.v1"
profile_name: "yolov26_lrdd_no_bird"

dataset:
  # Combined drone-only dataset: LRDDv2 + Anti-UAV300 RGB (no birds)
  manifest: "configs/training/airborne_dataset_manifest.yaml"
  prepared_dir: "data/training/yolov26_lrdd_no_bird"
  data_yaml: "data/training/yolov26_lrdd_no_bird/data.yaml"

model:
  family: "ultralytics_yolo"
  base_weights: "yolov26n.pt"  # Nano variant
  image_size: 640  # Matches dataset resize
  pretrained: true

training:
  epochs: 50  # Adjust as needed
  batch: 32
  patience: 20
  workers: 8
  device: "auto"
  project: "data/training/runs"
  run_name: "yolov26_lrdd_v2"
  optimizer: "auto"
  close_mosaic: 10
  seed: 42
  cache: false
  amp: true

augmentation:
  hsv_h: 0.015
  hsv_s: 0.45
  hsv_v: 0.35
  degrees: 0.0
  translate: 0.06
  scale: 0.45
  shear: 0.0
  perspective: 0.0
  fliplr: 0.5
  mosaic: 0.7
  mixup: 0.05
  copy_paste: 0.0

# Acceptance gate omitted for external dataset